name: CI/CD Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # application.yml을 빌드 전에 미리 만듭니다 (빌드 시 필요할 수 있음)
      - name: Make application.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/application.yml

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: .

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "*.jar"
          target: "/home/ubuntu/app/"   # 폴더명을 app으로 통일 (관리하기 편함)

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 배포 폴더 확인 및 생성
            mkdir -p /home/ubuntu/app
            
            # 2. application.yml 생성 (Secrets 내용 그대로 씀)
            echo "${{ secrets.APPLICATION_YML }}" > /home/ubuntu/app/application.yml

            # 3. 기존 실행 중인 서버 종료 (8080 포트)
            # (처음 배포라 꺼질 게 없어도 에러 안 나게 처리함)
            sudo fuser -k 8080/tcp || true

            # 4. 서버 실행 (nohup으로 백그라운드 실행)
            # 로그는 nohup.out에 저장됨
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/nohup.out 2>&1 &